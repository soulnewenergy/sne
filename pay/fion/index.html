<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>訂製純音樂 · 試聽與付款 · Soul New Energy</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
  :root{ --accent:#9fb4c9; --bg:#0f1417; --panel:#161d21; --line:#232c32;
    --chip-bg:#1a2328; --chip-border:#2b363d; --text:#e8eef3; --muted:#8a97a1; --body:#c3ccd3; }
  *{box-sizing:border-box; margin:0; padding:0}
  body{background:var(--bg); color:var(--text); font-family:-apple-system,"PingFang HK","Microsoft JhengHei",sans-serif; padding:24px 16px; line-height:1.6; -webkit-font-smoothing:antialiased}
  .page{max-width:480px; margin:0 auto; background:var(--panel); border-radius:14px; padding:40px 26px}
  .logo{display:block; width:76px; height:76px; border-radius:50%; object-fit:cover; margin:0 auto 18px}
  .kicker{font-size:11px; letter-spacing:3px; color:var(--accent); text-align:center; margin-bottom:20px}
  .title{font-family:Georgia,"Songti SC",serif; font-size:26px; text-align:center; margin-bottom:8px}
  .sub{font-size:14px; color:var(--muted); text-align:center; line-height:1.7}
  .rule{height:1px; background:var(--line); margin:30px 0}
  .label{font-size:12px; letter-spacing:2px; color:var(--accent); margin-bottom:16px}
  /* player */
  .player{background:var(--bg); border:.5px solid var(--chip-border); border-radius:12px; padding:20px}
  .player .ptop{display:flex; align-items:center; gap:14px}
  .player .pp{width:46px; height:46px; border-radius:50%; border:1px solid var(--accent); display:flex; align-items:center; justify-content:center; color:var(--accent); flex-shrink:0; cursor:pointer; transition:.2s}
  .player .pp:hover{background:var(--accent); color:var(--bg)}
  .player .pp i{font-size:22px}
  .player .pmeta .pt{font-size:14px; color:var(--text)}
  .player .pmeta .pd{font-size:12px; color:var(--muted); margin-top:2px}
  .bar{height:4px; background:var(--chip-border); border-radius:3px; margin-top:16px; cursor:pointer; position:relative}
  .bar .fill{height:100%; width:0; background:var(--accent); border-radius:3px}
  .time{display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:8px; font-variant-numeric:tabular-nums}
  /* arc */
  .arc{display:flex; gap:12px; align-items:flex-start; margin-bottom:14px}
  .arc .an{width:24px; height:24px; border-radius:50%; border:1px solid var(--accent); color:var(--accent); font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; font-variant-numeric:tabular-nums}
  .arc .at{font-size:14px; color:var(--text)}
  .arc .ad{font-size:13px; color:var(--muted); line-height:1.6}
  .arc .atime{font-size:11px; color:var(--muted); margin-left:6px}
  /* includes */
  .inc{display:flex; gap:10px; align-items:flex-start; margin-bottom:12px}
  .inc i{font-size:17px; color:var(--accent); margin-top:2px}
  .inc span{font-size:14px; color:var(--body); line-height:1.6}
  /* amount */
  .amt{background:var(--bg); border-radius:10px; padding:22px; text-align:center}
  .amt .k{font-size:13px; color:var(--muted); margin-bottom:8px}
  .amt .v{font-family:Georgia,"Songti SC",serif; font-size:34px; line-height:1.2}
  .amt .u{font-size:13px; color:var(--muted); margin-top:6px}
  .paywrap{text-align:center; margin-top:22px}
  .btn{display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:var(--bg); font-size:15px; font-weight:600; padding:14px 40px; border-radius:8px; text-decoration:none}
  .paynote{font-size:12px; color:var(--muted); margin-top:12px}
  .terms{font-size:13px; color:var(--muted); line-height:1.9}
  .terms i{font-size:15px; margin-right:6px; vertical-align:-2px; color:var(--accent)}
  .contact{margin-top:18px; text-align:center}
  .contact .cnote{font-size:13px; color:var(--muted); margin-bottom:10px}
  .clinks{display:flex; gap:10px; justify-content:center; flex-wrap:wrap}
  .clink{display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--accent); text-decoration:none; border:.5px solid var(--line); border-radius:20px; padding:7px 14px}
  .clink i{font-size:15px}
  .sign{font-size:13px; color:var(--muted); text-align:center; margin-top:26px; line-height:1.6}
  .draft{max-width:480px; margin:14px auto 0; font-size:12px; color:var(--muted); text-align:center; opacity:.7}
  .slot{color:var(--accent)}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     Fion 單（SNE-OQY2R28）· 一頁過：DEMO 試聽 + 付款 · mood cool
     只改呢個 DATA 物件。《橙字》＝slot，客戶原話唔准改。
     ⚠️ payHref 未貼＝付款掣未通，貼咗先可交付。
     交付客戶前：刪走最底 .draft 那行。
     ═══════════════════════════════════════════════════════════════ -->
<script>
const DATA = {
  logo: "https://soulnewenergy.com/images/SNE_logo.png",
  kicker: "SOUL NEW ENERGY ｜ 訂製純音樂",
  title: "為思念，寫一段陪伴",
  sub: "獻給每一位深深愛過、也被深深愛過的毛孩與家人",

  demoHeading: "先聽一段",
  demoTitle: "試聽版 · 訂製純音樂",
  demoDesc: "戴上耳機，給自己五分鐘",
  demoSrc: "demo.mp3",

  arcHeading: "音樂，會這樣走",
  arc: [
    { t: "開場", d: "讓心先安定下來，走進思念的空間", time: "0:00" },
    { t: "邀請", d: "進入愛與光的空間，邀請牠靠近", time: "1:48" },
    { t: "轉化", d: "把思念，慢慢化成祝福", time: "2:52" },
    { t: "收束", d: "放手、感謝，讓愛延續", time: "4:05" }
  ],

  planHeading: "你會收到",
  includes: [
    "完整訂製純音樂兩首（約五分鐘及八分鐘，儀式／陪伴用）",
    "依你的服務情境編排的四段情緒流（安定 → 邀請 → 轉化 → 放手）",
    "公開發佈授權（IG／FB／你的服務場景） · 交付 WAV ＋ MP3"
  ],

  amountLabel: "應付金額",
  amount: "US$222",
  amountNtd: "≈ NT$7,200",

  payHref: "https://payhip.com/b/HRGzL",
  payText: "前往付款",

  terms: [],
  contactText: "任何疑問，隨時聯絡我們",
  whatsapp: "85267494414",
  email: "hello@soulnewenergy.com",

  sign: "Paul & Cami",
  brand: "Soul New Energy｜心靈新能量"
};
</script>

<div id="page"></div>

<script>
function esc(s){ return String(s).replace(/</g,"&lt;").replace(/《/g,'<span class="slot">《').replace(/》/g,'》</span>'); }
function fmt(t){ if(isNaN(t)) return "0:00"; const m=Math.floor(t/60), s=Math.floor(t%60); return m+":"+String(s).padStart(2,"0"); }
function render(){
  document.body.setAttribute("data-mood","cool");
  const d = DATA;
  const arc = d.arc.map((x,i) =>
    `<div class="arc"><div class="an">${i+1}</div><div><div class="at">${esc(x.t)}<span class="atime">${esc(x.time)}</span></div><div class="ad">${esc(x.d)}</div></div></div>`).join("");
  const inc = d.includes.map(x => `<div class="inc"><i class="ti ti-check"></i><span>${esc(x)}</span></div>`).join("");
  const terms = d.terms.map(x => `<div><i class="ti ${x.icon}"></i>${esc(x.t)}</div>`).join("");
  document.getElementById("page").innerHTML = `
    <div class="page">
      <img class="logo" src="${d.logo}" alt="Soul New Energy">
      <div class="kicker">${esc(d.kicker)}</div>
      <div class="title">${esc(d.title)}</div>
      <div class="sub">${esc(d.sub)}</div>
      <div class="rule"></div>
      <div class="label">${esc(d.demoHeading)}</div>
      <div class="player">
        <div class="ptop">
          <div class="pp" id="pp"><i class="ti ti-player-play-filled"></i></div>
          <div class="pmeta"><div class="pt">${esc(d.demoTitle)}</div><div class="pd">${esc(d.demoDesc)}</div></div>
        </div>
        <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
        <div class="time"><span id="cur">0:00</span><span id="dur">0:00</span></div>
        <audio id="au" src="${d.demoSrc}" preload="metadata"></audio>
      </div>
      <div class="rule"></div>
      <div class="label">${esc(d.arcHeading)}</div>
      ${arc}
      <div class="rule"></div>
      <div class="label">${esc(d.planHeading)}</div>
      ${inc}
      <div class="rule"></div>
      <div class="amt"><div class="k">${esc(d.amountLabel)}</div><div class="v">${esc(d.amount)}</div><div class="u">${esc(d.amountNtd)}</div></div>
      <div class="paywrap">
        <a class="btn" href="${d.payHref}"><i class="ti ti-lock"></i> ${esc(d.payText)}</a>
        <div class="paynote">安全付款 · 完成後我們會收到通知並與你確認交付</div>
      </div>
      ${d.terms.length ? '<div class="rule"></div><div class="terms">'+terms+'</div>' : ''}
      <div class="contact"><div class="cnote">${esc(d.contactText)}</div>
        <div class="clinks">
          <a class="clink" href="https://wa.me/${d.whatsapp}"><i class="ti ti-brand-whatsapp"></i> WhatsApp</a>
          <a class="clink" href="mailto:${d.email}"><i class="ti ti-mail"></i> ${d.email}</a>
        </div></div>
      <div class="sign">${esc(d.sign)}<br>${esc(d.brand)}</div>
    </div>`;

  // player wiring
  const au=document.getElementById("au"), pp=document.getElementById("pp"),
        bar=document.getElementById("bar"), fill=document.getElementById("fill"),
        cur=document.getElementById("cur"), dur=document.getElementById("dur");
  au.addEventListener("loadedmetadata",()=>dur.textContent=fmt(au.duration));
  au.addEventListener("timeupdate",()=>{ fill.style.width=(au.currentTime/au.duration*100||0)+"%"; cur.textContent=fmt(au.currentTime); });
  au.addEventListener("ended",()=>{ pp.innerHTML='<i class="ti ti-player-play-filled"></i>'; });
  pp.addEventListener("click",()=>{ if(au.paused){au.play(); pp.innerHTML='<i class="ti ti-player-pause-filled"></i>';} else {au.pause(); pp.innerHTML='<i class="ti ti-player-play-filled"></i>';} });
  bar.addEventListener("click",(e)=>{ const r=bar.getBoundingClientRect(); au.currentTime=(e.clientX-r.left)/r.width*au.duration; });
}
render();
</script>
</body>
</html>
